# System Control Centre — frontend nginx config
#
# - SPA fallback to /index.html for client routing
# - Hashed assets in /assets/ get long cache TTL (vite hashes filenames)
# - /healthz returns 200 for container probes

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Healthcheck endpoint for k8s/docker probes
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hashed assets — long cache (filename changes on every build)
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Favicon — short cache
    location = /favicon.svg {
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback — every other route serves index.html (React Router)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
