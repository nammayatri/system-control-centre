<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#18181B"/>

  <!-- Central hub (control node) -->
  <circle cx="32" cy="32" r="8" fill="#2563EB" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="3.5" fill="#18181B"/>

  <!-- Top deployment node -->
  <circle cx="32" cy="14" r="5" fill="#16A34A" stroke="#22C55E" stroke-width="1"/>
  <path d="M32 12l2 3h-4l2-3z" fill="#18181B"/>

  <!-- Bottom-left node -->
  <circle cx="16" cy="46" r="5" fill="#D97706" stroke="#F59E0B" stroke-width="1"/>
  <rect x="14" y="44" width="4" height="4" rx="0.5" fill="#18181B"/>

  <!-- Bottom-right node -->
  <circle cx="48" cy="46" r="5" fill="#7C3AED" stroke="#8B5CF6" stroke-width="1"/>
  <path d="M46 44.5h4v1.5h-2.5V48h-1.5v-3.5z" fill="#18181B"/>

  <!-- Connection lines (flow paths) -->
  <line x1="32" y1="19" x2="32" y2="24" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="37" x2="20" y2="42" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="37" x2="44" y2="42" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Flow arrows on lines -->
  <circle cx="32" cy="21" r="1" fill="#60A5FA"/>
  <circle cx="23" cy="39.5" r="1" fill="#60A5FA"/>
  <circle cx="41" cy="39.5" r="1" fill="#60A5FA"/>

  <!-- Outer ring segments (progress/status indicator) -->
  <path d="M32 6a26 26 0 0 1 22.5 13" stroke="#22C55E" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M54.5 19a26 26 0 0 1 3.5 13" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M6 32a26 26 0 0 1 4-14" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>