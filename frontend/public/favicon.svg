  <!-- Outer arc indicators -->
  <path d="M32 5a27 27 0 0 1 23 13" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M9 32a27 27 0 0 1 4-15" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
