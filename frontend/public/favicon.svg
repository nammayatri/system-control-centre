<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    System Control Centre
    Concept: Traffic Split (Canary Release)
    A single incoming path branches into two destinations — the visual
    signature of every release this product orchestrates. The right
    destination is green = the new version receiving promoted traffic.
  -->

  <!-- White rounded background with subtle border -->
  <rect width="64" height="64" rx="14" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1"/>

  <!-- Traffic split path: stem rises, then forks left + right -->
  <path
    d="M32 54 L32 36 L18 20"
    stroke="#0F172A"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
  <path
    d="M32 36 L46 20"
    stroke="#0F172A"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>

  <!-- Source node (incoming traffic) -->
  <circle cx="32" cy="54" r="4" fill="#0F172A"/>

  <!-- Old version destination (left, dark) -->
  <circle cx="18" cy="20" r="5.5" fill="#FFFFFF" stroke="#0F172A" stroke-width="3.5"/>

  <!-- New version destination (right, green — promoted) -->
  <circle cx="46" cy="20" r="5.5" fill="#10B981"/>
  <circle cx="46" cy="20" r="2" fill="#FFFFFF"/>
</svg>
