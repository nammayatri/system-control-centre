  <line x1="26" y1="38" x2="19" y2="43" stroke="#60A5FA" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="38" y1="38" x2="45" y2="43" stroke="#60A5FA" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>

  <!-- Flow dots -->
