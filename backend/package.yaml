# hpack defaults
# Ref: https://github.com/sol/hpack#defaults

# Workaround for segfault on macOS
# https://github.com/NixOS/nixpkgs/issues/149692#issuecomment-1587564664
name: namma-ap
version: 0.1.0.0
github: "nammayatri/system-control-centre"
license: OtherLicense
author: NammaYatri
maintainer: platform@nammayatri.in
synopsis: System Control Centre — release orchestration with RBAC
description: Monolith backend for system control dashboard with typed RBAC, product modules, and release orchestration.

flags:
  Local:
    description: Build with no optimization for faster dev builds
    manual: true
    default: true

when:
  - condition: flag(Local)
    then:
      ghc-options:
        - -O0
        - -funfolding-use-threshold20
        - -fno-cse
        - -fmax-simplifier-iterations1
        - -fno-specialise-aggressively
    else:
      ghc-options:
        - -O2

ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-uni-patterns
  - -Wincomplete-record-updates
  - -Wpartial-fields
  - -Wunused-imports
  - -j4

dependencies:
  - base >= 4.16 && < 5
  - aeson
  - async
  - beam-core
  - beam-postgres
  - bytestring
  - containers
  - directory
  - filepath
  - http-client
  - http-client-tls
  - http-types
  - mtl
  - postgresql-simple
  - process
  - resource-pool
  - scientific
  - servant
  - servant-server
  - stm
  - text
  - time
  - transformers
  - unordered-containers
  - uuid
  - wai
  - wai-cors
  - warp

default-extensions:
  - OverloadedStrings
  - DeriveGeneric
  - RecordWildCards
  - DuplicateRecordFields
  - DataKinds
  - TypeOperators

library:
  source-dirs: src

executables:
  namma-ap-exe:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - "-with-rtsopts=-N -T"
    dependencies:
      - namma-ap

tests:
  namma-ap-test:
    main: Main.hs
    source-dirs: test
    dependencies:
      - namma-ap
