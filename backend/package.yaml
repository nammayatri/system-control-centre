# hpack defaults
# Ref: https://github.com/sol/hpack#defaults

# Workaround for segfault on macOS
# https://github.com/NixOS/nixpkgs/issues/149692#issuecomment-1587564664
name: scc
version: 0.1.0.0
github: "nammayatri/system-control-centre"
license: OtherLicense
author: NammaYatri
maintainer: platform@nammayatri.in
synopsis: System Control Centre — release orchestration with RBAC
description: Monolith backend for system control dashboard with typed RBAC, product modules, and release orchestration.

flags:
  Local:
    description: Build with no optimization for faster dev builds
    manual: true
    default: true

when:
  - condition: flag(Local)
    then:
      ghc-options:
        - -O0
        - -funfolding-use-threshold20
        - -fno-cse
        - -fmax-simplifier-iterations1
        - -fno-specialise-aggressively
    else:
      ghc-options:
        - -O2

# -Werror=missing-fields: partial record construction (a field omitted from
# `T { ... }`) otherwise compiles as a mere warning but throws "Missing field in
# record construction" at runtime when the thunk is forced. Making ONLY this one
# fatal stops a record-field addition from silently shipping a latent crash —
# without turning all of -Wall into -Werror.
ghc-options:
  - -Wall
  - -Wcompat
  - -Widentities
  - -Wincomplete-uni-patterns
  - -Wincomplete-record-updates
  - -Wpartial-fields
  - -Wunused-imports
  - -Werror=missing-fields
  - -j4

dependencies:
  - base >= 4.16 && < 5
  - aeson
  - asn1-encoding
  - asn1-types
  - async
  - base64-bytestring
  - beam-core
  - beam-postgres
  - bytestring
  - case-insensitive
  - containers
  - cryptonite
  - fast-logger
  - directory
  - exceptions
  - filepath
  - http-client
  - http-client-tls
  - http-types
  - jwt
  - memory
  - mtl
  - postgresql-simple
  - process
  - resource-pool
  - scientific
  - servant
  - servant-server
  - stm
  - text
  - time
  - transformers
  - unordered-containers
  - uuid
  - vector
  - wai
  - wai-cors
  - warp
  - yaml

default-extensions:
  - ConstraintKinds
  - DataKinds
  - DeriveGeneric
  - DuplicateRecordFields
  - FlexibleContexts
  - OverloadedStrings
  - RecordWildCards
  - TypeOperators

